<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page Not Found — Zeba Yasmeen Portfolio" />
    <title>404 | Page Not Found — Zeba Yasmeen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
    <link id='favicon' rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-png">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none; }

        :root {
            --bg: #0a0b0f;
            --card: #111318;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --gradient: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
            --text: #f0f0f6;
            --muted: #9ca3af;
            --border: rgba(255,255,255,0.07);
            --font: 'Inter', sans-serif;
            --code: 'Fira Code', monospace;
        }

        html { font-size: 62.5%; }
        body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 60rem;
            height: 60rem;
            background: radial-gradient(circle, rgba(124,58,237,0.15), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 60rem;
        }

        .code-tag {
            font-family: var(--code);
            font-size: 1.3rem;
            color: var(--purple);
            letter-spacing: 0.1rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        .error-number {
            font-size: clamp(10rem, 20vw, 18rem);
            font-weight: 900;
            line-height: 1;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            font-family: var(--code);
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.6rem;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 3.5rem;
            font-weight: 400;
        }

        .actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1.3rem 2.8rem;
            background: var(--gradient);
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 0.8rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(124,58,237,0.4);
            font-family: var(--font);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(124,58,237,0.6);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1.3rem 2.8rem;
            background: transparent;
            color: var(--text);
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 0.8rem;
            border: 1.5px solid rgba(139,92,246,0.4);
            transition: all 0.3s ease;
            font-family: var(--font);
            cursor: pointer;
        }

        .btn-back:hover {
            background: rgba(139,92,246,0.1);
            transform: translateY(-3px);
        }

        .footer-note {
            margin-top: 5rem;
            font-size: 1.3rem;
            color: rgba(255,255,255,0.2);
        }

        .footer-note a { color: var(--purple); }

        @media (max-width: 480px) {
            .actions { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="wrapper">
        <span class="code-tag">// error_boundary.js</span>
        <div class="error-number">404</div>
        <h1>Page Not Found</h1>
        <p>Oops! The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
        <div class="actions">
            <a href="/" class="btn-home">
                <i class="fas fa-home"></i> Go Home
            </a>
            <button class="btn-back" onclick="history.back()">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>
        </div>
        <p class="footer-note">
            <a href="/">Zeba Yasmeen Portfolio</a> &nbsp;·&nbsp; Built with ❤️
        </p>
    </div>
</body>
</html>
